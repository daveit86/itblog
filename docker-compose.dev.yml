version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: itblog-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: itblog
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: itblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - itblog-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itblog -d itblog"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application (Development)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: itblog-app-dev
    restart: unless-stopped
    ports:
      - "98172:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://itblog:devpassword@db:5432/itblog
      # NextAuth
      NEXTAUTH_URL: http://localhost:98172
      NEXTAUTH_SECRET: dev-secret-key-change-in-production
      # Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      # Notifications
      ADMIN_NOTIFICATION_EMAIL: admin@example.com
      # App URL
      NEXT_PUBLIC_APP_URL: http://localhost:98172
    volumes:
      # Mount source code for hot-reloading
      - .:/app
      # Don't overwrite node_modules
      - /app/node_modules
      - /app/.next
      # Persist uploads
      - uploads_dev_data:/app/public/uploads
    networks:
      - itblog-dev-network
    depends_on:
      db:
        condition: service_healthy
    # Enable stdin and tty for better dev experience
    stdin_open: true
    tty: true

volumes:
  postgres_dev_data:
    name: itblog-postgres-dev-data
  uploads_dev_data:
    name: itblog-uploads-dev-data

networks:
  itblog-dev-network:
    driver: bridge
